<!DOCTYPE html>
<html>
<head>
    <title>Nokia Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Helvetica,sans-serif;}
        body{background:#ffffff;}
        .app-layout {
            display: flex;
            margin-top: 60px;
            min-height: calc(100vh - 60px);
        }
        .content {
            flex: 1;
            padding: 24px;
        }
        .top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
        .top-row h1{font-size:20px;font-weight:600;color:#0f172a;}
        .cards{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:20px;}
        .card{padding:16px;border-radius:10px;color:#fff;}
        .card h3{font-size:12px;font-weight:400;opacity:0.85;margin-bottom:8px;}
        .card h2{font-size:26px;font-weight:700;}
        .accounts{background:#4e86ff;}
        .customers{background:#2563eb;}
        .oppurtunities{background:#214caa;}
        .po{background:#092970;}
        .products{background:#0d1830;}
        .users{background:#050d1b;}
    </style>
</head>
<body>

{% include 'navbar.html' %}

<div class="app-layout">
    {% include 'sidebar.html' %}

    <div class="content">
        <div class="top-row"><h1>Dashboard</h1></div>
        <div class="cards">
            <div class="card accounts"><h3>Accounts</h3><h2>{{ counts.accounts }}</h2></div>
            <div class="card customers"><h3>Customers</h3><h2>{{ counts.customers }}</h2></div>
            <div class="card oppurtunities"><h3>Opportunities</h3><h2>{{ counts.opportunities }}</h2></div>
            <div class="card po"><h3>PO</h3><h2>{{ counts.po }}</h2></div>
            <div class="card products"><h3>Products</h3><h2>{{ counts.products }}</h2></div>
            <div class="card users"><h3>Users</h3><h2>{{ counts.users }}</h2></div>
        </div>
    </div>
</div>

<script>

</script>

</body>
</html>
