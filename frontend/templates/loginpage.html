<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Deployment Tracker Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css_styling/login_style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="login-container">

        <div class="left-panel">
            <div class="network-bg">
                <span class="node n1"></span>
                <span class="node n2"></span>
                <span class="node n3"></span>
                <span class="node n4"></span>
                <span class="node n5"></span>
                <span class="node n6"></span>
                <span class="node n7"></span>
                <span class="node n8"></span>
                <span class="node n9"></span>
                <span class="node n10"></span>
            </div>

            <div class="brand">
                <h1>Deployment Tracker</h1>
                <p>Track Opportunities, Purchase Orders, Milestones and Deployments from a single workspace.</p>
            </div>
        </div>

        <div class="right-panel">
            <div class="login-card">
                <img src="{{ url_for('static', filename='images/logo.jpeg') }}" alt="Nokia Logo" class="card-logo">

                <h2>Welcome Back</h2>
                <p class="subtitle">Sign in to continue</p>

                <form id="loginForm">
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" id="email" class="form-control" placeholder="Enter email">
                    </div>

                    <div class="mb-3 password-wrapper">
                        <label>Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Enter password">
                        <button type="button" id="togglePassword">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>

                    <div class="options">
                        <div>
                            <input type="checkbox">
                            Remember Me
                        </div>
                        <a href="#">Forgot Password?</a>
                    </div>

                    <button class="btn btn-primary login-btn w-100" type="submit">
                        Sign In
                    </button>
                </form>
            </div>
        </div>

    </div>

    <script src="{{ url_for('static', filename='js/login_script.js') }}"></script>

</body>
</html>
