
            <style>
                .navbar{height:60px;background:#ffffff;border-bottom:1px solid #dddddd;display:flex;justify-content:space-between;align-items:center;padding:0 20px;position:fixed;top:0;left:0;right:0;z-index:1000;}
                .nav-left{display:flex;align-items:center;gap:16px;}
                .logo{display:flex;align-items:center;gap:10px;}
                .logo img{width:32px;height:32px;object-fit:contain;}
                .logo h3{font-size:16px;color:#0c1834;font-weight:600;}
                .menu-btn{border:none;background:none;cursor:pointer;color:#475569;padding:6px 8px;border-radius:6px;display:flex;align-items:center;}
                .menu-btn:hover{background:#c3c3c3;}
                .menu-btn i{font-size:22px;}
                .profile-wrap{position:relative;}
                .profile{display:flex;align-items:center;gap:10px;cursor:pointer;padding:6px 10px;border-radius:8px;transition:background 0.2s;}
                .profile:hover{background:#dedede;}
                .profile-pic{width:34px;height:34px;border-radius:50%;background:#2563eb;display:flex;justify-content:center;align-items:center;color:#fff;font-size:14px;font-weight:600;}
                .profile-name{font-size:14px;color:#334155;}
                .arrow{color:#94a3b8;transition:transform 0.2s;display:flex;align-items:center;}
                .arrow i{font-size:16px;}
                .arrow.open{transform:rotate(180deg);}
                .dropdown{display:none;position:absolute;top:calc(100% + 8px);right:0;background:#fff;border:0.5px solid #e2e8f0;border-radius:10px;min-width:185px;box-shadow:0 4px 16px rgba(0,0,0,0.08);z-index:999;overflow:hidden;}
                .dropdown.show{display:block;}
                .dropdown-header{padding:12px 16px;border-bottom:0.5px solid #f1f5f9;}
                .dropdown-header p{font-size:13px;color:#0f172a;font-weight:500;}
                .dropdown-header span{font-size:11px;color:#94a3b8;}
                .dropdown a{display:flex;align-items:center;gap:10px;padding:11px 16px;font-size:13px;color:#334155;text-decoration:none;transition:background 0.15s;}
                .dropdown a i{font-size:16px;color:#64748b;}
                .dropdown a:hover{background:#f8fafc;}
                .dropdown a.logout{color:#dc2626;}
                .dropdown a.logout i{color:#dc2626;}
            </style>
            
            <div class="navbar">
                <div class="nav-left">
                    <div class="logo">
                        <img src="{{ url_for('static', filename='images/logo.jpeg') }}">
                        <h3>Nokia</h3>
                    </div>
                    <button class="menu-btn" onclick="toggleSidebar()">
                        <i class="ti ti-menu-2"></i>
                    </button>
                </div>
                <div class="profile-wrap">
                    <div class="profile" onclick="toggleDropdown()">
                        <div class="profile-pic">UG</div>
                        <span class="profile-name">Urvashi</span>
                        <span class="arrow" id="arrow"><i class="ti ti-chevron-down"></i></span>
                    </div>
                    <div class="dropdown" id="dropdown">
                        <div class="dropdown-header">
                            <div class="profile">
                                <div class="profile-pic">{{ session.get('user_name', 'U')[0] | upper }}</div>
                                <span class="profile-name">{{ session.get('user_name', 'User') }}</span>
                            </div>
                        </div>
                        <a href="/editprofile"><i class="ti ti-user-edit"></i> Edit Profile</a>
                        <a href="/" class="logout"><i class="ti ti-logout"></i> Log out</a>
                    </div>
                </div>
            </div>

            <script>
                 function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("collapsed");
    }
function toggleDropdown(){
    const dd=document.getElementById("dropdown");
    const c=document.getElementById("arrow");
    dd.classList.toggle("show");
    c.classList.toggle("open");
}
            </script>
